server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to analytics service
    location /api/ {
        proxy_pass http://analytics-service:8085;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
