server:
  port: 8084

spring:
  application:
    name: comparator-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shadowdb}
    username: ${SPRING_DATASOURCE_USERNAME:shadow}
    password: ${SPRING_DATASOURCE_PASSWORD:shadow123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update          # auto-create comparison_results table
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: comparator-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: MANUAL_IMMEDIATE

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
