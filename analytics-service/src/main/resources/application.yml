server:
  port: 8085

spring:
  application:
    name: analytics-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/shadowdb}
    username: ${SPRING_DATASOURCE_USERNAME:shadow}
    password: ${SPRING_DATASOURCE_PASSWORD:shadow123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none          # schema managed by comparator-service
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
