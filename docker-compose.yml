services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [shadow-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [shadow-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    ports: ["9090:8080"]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [shadow-net]

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-shadow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shadow123}
      POSTGRES_DB: ${POSTGRES_DB:-shadowdb}
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [shadow-net]

  redis:
    image: redis:7-alpine
    ports: ["${REDIS_PORT:-6379}:6379"]
    networks: [shadow-net]

  # ── Application Services ────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports: ["${API_GATEWAY_PORT:-8080}:8080"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      DUPLICATOR_URL: http://traffic-duplicator:8081
      REDIS_HOST: redis
    depends_on: [redis, traffic-duplicator]
    networks: [shadow-net]

  traffic-duplicator:
    build: ./traffic-duplicator
    ports: ["${TRAFFIC_DUPLICATOR_PORT:-8081}:8081"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      KAFKA_BOOTSTRAP: kafka:29092
      ORDER_V1_URL: http://order-service-v1:8082
      ORDER_V2_URL: http://order-service-v2:8083
    depends_on: [kafka, order-service-v1, order-service-v2]
    networks: [shadow-net]

  order-service-v1:
    build: ./order-service-v1
    ports: ["${ORDER_SERVICE_V1_PORT:-8082}:8082"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shadowdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-shadow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-shadow123}
    depends_on: [postgres]
    networks: [shadow-net]

  order-service-v2:
    build: ./order-service-v2
    ports: ["${ORDER_SERVICE_V2_PORT:-8083}:8083"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shadowdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-shadow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-shadow123}
      # Chaos flags — flip to simulate failures
      CHAOS_DELAY_MS: ${CHAOS_DELAY_MS:-0}
      CHAOS_FAIL_RATE: ${CHAOS_FAIL_RATE:-0}
    depends_on: [postgres]
    networks: [shadow-net]

  comparator-service:
    build: ./comparator-service
    ports: ["${COMPARATOR_SERVICE_PORT:-8084}:8084"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      KAFKA_BOOTSTRAP: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shadowdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-shadow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-shadow123}
    depends_on: [kafka, postgres]
    networks: [shadow-net]

  analytics-service:
    build: ./analytics-service
    ports: ["${ANALYTICS_SERVICE_PORT:-8085}:8085"]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shadowdb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-shadow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-shadow123}
    depends_on: [postgres]
    networks: [shadow-net]

  dashboard:
    build: ./dashboard-frontend
    ports: ["${DASHBOARD_PORT:-3000}:3000"]
    environment:
      REACT_APP_ANALYTICS_URL: ${REACT_APP_ANALYTICS_URL:-http://localhost:8085}
    networks: [shadow-net]

volumes:
  pgdata:

networks:
  shadow-net:
    driver: bridge
